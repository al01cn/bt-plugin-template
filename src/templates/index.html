<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ data['title'] if data and 'title' in data else '插件 DEMO' }}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f0f2f5;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
        }
        .card {
            min-width: 400px;
            padding: 48px 56px;
            border-radius: 12px;
            background: #ffffff;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
            text-align: center;
        }
        .card h1 {
            font-size: 32px;
            color: #20a53a;
            margin-bottom: 12px;
        }
        .card p {
            font-size: 14px;
            color: #86909c;
            line-height: 1.6;
        }
        .card .info {
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid #f0f0f0;
            font-size: 13px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>{{ data['message'] if data and 'message' in data else 'Hello World' }}</h1>
        <p>宝塔插件 DEMO - 独立模板页面（支持 Jinja2 渲染）</p>
        <div class="info">
            {% if data %}
                <p>服务器时间: {{ data.get('server_time', '--') }}</p>
                <p>插件版本: {{ data.get('plugin_version', '--') }}</p>
            {% endif %}
        </div>
    </div>
</body>
</html>
